changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 新功能
      labels:
        - enhancement
    - title: 问题修复
      labels:
        - bug
    - title: 文档
      labels:
        - documentation
    - title: 依赖与维护
      labels:
        - dependencies
        - github-actions
    - title: 其他变更
      labels:
        - "*"
